categories:
  AI_RESEARCH:
    description: "AI/ML 最新研究・論文"
    feeds:
      - name: "arXiv cs.AI"
        url: "https://rss.arxiv.org/rss/cs.AI"
      - name: "arXiv cs.CL (NLP)"
        url: "https://rss.arxiv.org/rss/cs.CL"
      - name: "arXiv cs.LG (Machine Learning)"
        url: "https://rss.arxiv.org/rss/cs.LG"
      - name: "Google AI Blog"
        url: "https://blog.google/technology/ai/rss/"
      - name: "OpenAI Blog"
        url: "https://openai.com/blog/rss.xml"
      - name: "DeepMind Blog"
        url: "https://deepmind.google/blog/rss.xml"

  AI_PRODUCT_SAAS:
    description: "AI プロダクト・SaaS動向"
    feeds:
      - name: "TechCrunch AI"
        url: "https://techcrunch.com/category/artificial-intelligence/feed/"
      - name: "The Verge AI"
        url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
      - name: "Hacker News (Best)"
        url: "https://hnrss.org/best"
      - name: "Product Hunt"
        url: "https://www.producthunt.com/feed"

  MACRO_STRUCTURE:
    description: "マクロ経済・構造変化"
    feeds:
      - name: "Bloomberg Markets"
        url: "https://feeds.bloomberg.com/markets/news.rss"
      - name: "Reuters Business"
        url: "https://www.reutersagency.com/feed/"
      - name: "MIT Technology Review"
        url: "https://www.technologyreview.com/feed/"

  JAPAN_SIGNAL:
    description: "日本市場・テック動向"
    feeds:
      - name: "はてなブックマーク - テクノロジー"
        url: "https://b.hatena.ne.jp/hotentry/it.rss"
      - name: "Publickey"
        url: "https://www.publickey1.jp/atom.xml"
      - name: "Zenn Trending"
        url: "https://zenn.dev/feed"
      - name: "Gigazine"
        url: "https://gigazine.net/news/rss_2.0/"

  AGRICULTURE:
    description: "農業テック・スマート農業"
    feeds:
      - name: "AgFunder News"
        url: "https://agfundernews.com/feed"
      - name: "農業新聞"
